name: Production Health Check

on:
  # Exécuter toutes les 15 minutes
  schedule:
    - cron: '*/15 * * * *'

  # Permettre exécution manuelle
  workflow_dispatch:

# Required for creating issues via GITHUB_TOKEN
permissions:
  issues: write

jobs:
  health-check:
    name: Check /api/health Endpoint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check API Health
        id: health
        run: |
          echo "Checking https://esdrasgbedozin.dev/api/health..."

          # Retry up to 3 times with 10s delay to avoid false positives
          # during Vercel cold starts or transient network issues
          for attempt in 1 2 3; do
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://esdrasgbedozin.dev/api/health)
            if [ "$response" -eq 200 ]; then
              echo "✅ Health check PASSED (attempt $attempt): HTTP $response"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "⚠️ Attempt $attempt failed: HTTP $response — retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check FAILED after 3 attempts: HTTP $response"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1

      - name: Create GitHub Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Check for existing open health-check issue to avoid spam
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-check',
              state: 'open',
              per_page: 1
            });

            if (existingIssues.length > 0) {
              // Add comment to existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues[0].number,
                body: `⚠️ **Still failing** at ${new Date().toISOString()}\n\n[Workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
              console.log(`📝 Added comment to existing issue #${existingIssues[0].number}`);
              return;
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Production Health Check Failed',
              body: `## Health Check Failure
              
**Time**: ${new Date().toISOString()}
**Endpoint**: https://esdrasgbedozin.dev/api/health
**Status**: Failed to return HTTP 200 after 3 retries

### Possible Causes
- Edge Function crash
- Vercel deployment issue
- Network connectivity problem
- Rate limiting (DDoS)

### Action Required
1. Check Vercel deployment logs: https://vercel.com/esdrasgbedozin/deployments
2. Check Sentry errors: https://sentry.io/organizations/esdrasgbedozin/issues/
3. Verify API dependencies (Brevo/SendGrid status)

### Immediate Steps
\`\`\`bash
# Check deployment status
vercel ls --prod

# View real-time logs
vercel logs --prod --follow

# Rollback if necessary
vercel rollback <deployment-id>
\`\`\`

[View workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'production', 'p0-critical', 'health-check']
            });

            console.log(`✅ Created issue: ${issue.data.html_url}`);

      - name: Send Slack Notification on Failure
        if: failure() && vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "🚨 Production Health Check Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Health Check Failed*\n\n*Endpoint*: https://esdrasgbedozin.dev/api/health\n*Time*: ${{ github.event.repository.updated_at }}\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>"
                  }
                }
              ]
            }
